# OpenClarion Development Services
#
# Image pinning policy (see docs/design/DEPENDENCIES.md):
#   - This file is for LOCAL DEVELOPMENT ONLY. Tag-based pinning is the
#     baseline; @sha256 digest is NOT required here.
#   - The literal `latest` is forbidden; every image MUST use a concrete,
#     non-`latest` tag. PostgreSQL uses the official pgvector image with both
#     extension and PostgreSQL versions pinned; other local services pin to a
#     concrete release tag (e.g. `temporalio/auto-setup:1.25.2`).
#   - Production deployments and the M4 sandbox runtime MUST pin to digest;
#     that policy is enforced by a separate CI gate introduced at M4.
#
# Usage:
#   docker compose up -d          # start PostgreSQL and Temporal
#   docker compose --profile sandbox-egress up -d --wait
#                                # also start the isolated sandbox proxy
#   docker compose down -v        # stop and remove volumes
#   docker compose logs temporal  # view temporal logs
#
# Port overrides (for hosts where the default port is occupied):
#   POSTGRES_PORT=25432 TEMPORAL_PORT=27233 TEMPORAL_UI_PORT=28233 \
#       docker compose up -d --wait
#
# Prerequisites:
#   Docker Engine 24+ with Docker Compose 2.33.1+ (`gw_priority` support)

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    environment:
      POSTGRES_USER: openclarion
      POSTGRES_PASSWORD: openclarion_dev
      POSTGRES_DB: openclarion
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18 stores data in a major-version-specific subdirectory
      # under /var/lib/postgresql; mount the parent so future pg_upgrade --link
      # can stay within a single volume boundary.
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-openclarion-db.sql:/docker-entrypoint-initdb.d/00-openclarion.sql:ro
      - ./scripts/init-temporal-db.sql:/docker-entrypoint-initdb.d/01-temporal.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclarion"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal_dev
      - POSTGRES_SEEDS=postgres
      # The temporal/temporal_visibility databases are pre-created by
      # scripts/init-temporal-db.sql; the temporal user has no CREATEDB
      # privilege, so tell auto-setup to skip its CREATE DATABASE step.
      - SKIP_DB_CREATE=true
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
      # Bind on all interfaces so the in-container healthcheck CLI
      # (which defaults to 127.0.0.1:7233) can reach the gRPC frontend.
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    volumes:
      - ./deploy/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--namespace", "default"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      # The UI image is Alpine-based; wget is present. A 200 on the root
      # path indicates the UI HTTP server is up and serving the SPA shell.
      # This does NOT prove the UI has successfully connected to the
      # Temporal frontend; that is covered by the temporal service's own
      # healthcheck (`temporal workflow list`) which runs against the
      # gRPC frontend, plus the depends_on `service_healthy` ordering.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  openclarion-egress-proxy:
    image: "${OPENCLARION_LOCAL_EGRESS_PROXY_IMAGE:-openclarion/local-egress-proxy:dev}"
    pull_policy: never
    profiles: ["sandbox-egress"]
    environment:
      OPENCLARION_EGRESS_PROXY_ALLOWED: "${OPENCLARION_SANDBOX_EGRESS_ALLOWED:-}"
      OPENCLARION_EGRESS_PROXY_LISTEN_ADDR: ":18080"
    expose:
      - "18080"
    user: "65532:65532"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 64m
    cpus: 0.50
    networks:
      default:
        gw_priority: 1
      sandbox-egress:
        aliases:
          - openclarion-egress-proxy
    healthcheck:
      test: ["CMD", "/openclarion-egress-proxy", "healthcheck", "http://127.0.0.1:18080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  sandbox-egress:
    name: "${OPENCLARION_SANDBOX_EGRESS_NETWORK:-openclarion-sandbox-allowlist}"
    internal: true
