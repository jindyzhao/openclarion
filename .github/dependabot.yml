version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Hong_Kong"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Hong_Kong"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    groups:
      go-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      go-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/tools/openclarion-linter"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "Asia/Hong_Kong"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
      - "tooling"
    groups:
      openclarion-linter-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      openclarion-linter-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    ignore:
      # The custom analyzer module must use the exact golang.org/x/tools
      # version embedded in the pinned golangci-lint binary. Normal
      # minor/major x/tools bumps are coordinated with GOLANGCI_LINT_VERSION;
      # security updates still use Dependabot's security-update path.
      - dependency-name: "golang.org/x/tools"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Hong_Kong"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    groups:
      web-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      web-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    ignore:
      # @types/node follows the Node.js runtime major. Major type-definition
      # bumps are coordinated with the CI Node.js baseline in ci.yml and
      # docs/design/DEPENDENCIES.md; security updates still use Dependabot's
      # security-update path.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
