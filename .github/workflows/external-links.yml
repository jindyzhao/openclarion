name: external-links-live

# Scheduled workflows run from the default branch. Keep this workflow separate
# from PR CI so transient Internet failures do not block ordinary changes.
on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  external-links-live:
    name: External HTTPS links live
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      OPENCLARION_EXTERNAL_LINKS_LIVE: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: make external-links-check
