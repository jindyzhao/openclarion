name: external-links-live

# Scheduled workflows run from the default branch. Keep this workflow separate
# from PR CI so transient Internet failures do not block ordinary changes.
on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  external-links-live:
    name: External HTTPS links live
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      OPENCLARION_EXTERNAL_LINKS_LIVE: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: make external-links-check
