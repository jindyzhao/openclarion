name: ci

# CI must call repository-owned `make` targets (see docs/design/ci/README.md
# "Workflow Policy"). Inline shell is forbidden and enforced by the
# `workflow-parity` job below.
#
# Action pinning: third-party actions are pinned to a full commit SHA
# rather than a mutable tag, with the human-readable version in a
# trailing comment. See docs/design/DEPENDENCIES.md for the policy.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-parity:
    name: Workflow / Makefile parity
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make workflow-parity

  docs-hygiene:
    name: Docs hygiene
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make docs-hygiene

  forbidden-methods:
    name: Forbidden methods
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make forbidden

  adr-check:
    name: ADR index
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make adr-check

  links-check:
    name: Markdown links
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: make links-check

  dco-check:
    name: DCO sign-off
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    env:
      DCO_BASE_REF: ${{ github.base_ref }}
      DCO_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - run: make dco-check

  go-checks:
    name: Go checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - run: make go-checks

  ent-checks:
    name: Ent generation freshness
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - run: make ent-fresh

  atlas-drift:
    name: Atlas migration drift
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # The runner has a working Docker daemon and CLI. `actions/setup-go`
      # is required because the Atlas Ent loader needs a host `go` binary
      # available to introspect `ent://...` schema (the Atlas Docker image
      # itself does not ship Go); the Makefile wrapper mounts the host
      # toolchain into the Atlas container. The gate is a no-op until the
      # first migration lands, but the wiring is permanent from M1-PR1.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - run: make atlas-drift

  openapi-checks:
    name: OpenAPI checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - run: make openapi-checks
