      - run: make diagnosis-chat-persistence-test

  diagnosis-live-smoke-output:
    name: Diagnosis live smoke proof
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: make diagnosis-live-smoke-output-test

  ent-checks:
    name: Ent generation freshness
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: make ent-fresh

  atlas-drift:
    name: Atlas migration drift
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # The runner has a working Docker daemon and CLI. `actions/setup-go`
      # is required because the Atlas Ent loader needs a host `go` binary
      # available to introspect `ent://...` schema (the Atlas Docker image
      # itself does not ship Go); the Makefile wrapper mounts the host
      # toolchain into the Atlas container. The gate is a no-op until the
      # first migration lands, but the wiring is permanent from M1-PR1.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: make atlas-drift

  openapi-checks:
    name: OpenAPI checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
