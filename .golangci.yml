version: "2"

run:
  go: "1.25"
  tests: true
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - errname
    - errorlint
    - forbidigo
    - gosec
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - nolintlint
    - openclarion-arch
    - revive
    - unconvert
    - unparam
    - unused

  exclusions:
    generated: strict
    paths:
      - ^web/node_modules/

  settings:
    custom:
      openclarion-arch:
        type: module
        description: OpenClarion architecture boundary checks
    depguard:
      rules:
        forbidden-runtime-deps:
          list-mode: lax
          deny:
            - pkg: github.com/gin-gonic/gin
              desc: ADR-0012 forbids third-party HTTP frameworks.
            - pkg: github.com/labstack/echo
              desc: ADR-0012 forbids third-party HTTP frameworks.
            - pkg: github.com/gofiber/fiber
              desc: ADR-0012 forbids third-party HTTP frameworks.
            - pkg: github.com/go-redis/redis
              desc: ADR-0001 keeps PostgreSQL as the single runtime data store.
            - pkg: github.com/redis/go-redis
              desc: ADR-0001 keeps PostgreSQL as the single runtime data store.
            - pkg: github.com/gomodule/redigo
              desc: ADR-0001 keeps PostgreSQL as the single runtime data store.
            - pkg: go.mongodb.org/mongo-driver
              desc: ADR-0001 keeps PostgreSQL as the single runtime data store.
            - pkg: github.com/qdrant/go-client
              desc: ADR-0001 excludes external vector databases from the MVP runtime.
            - pkg: github.com/milvus-io/milvus-sdk-go
              desc: ADR-0001 excludes external vector databases from the MVP runtime.
            - pkg: github.com/weaviate/weaviate-go-client
              desc: ADR-0001 excludes external vector databases from the MVP runtime.

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
  sort-order:
    - linter
    - file
