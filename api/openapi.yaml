              examples:
                unauthorized:
                  value:
                    error: unauthorized
        "404":
          description: Diagnosis session was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not-found:
                  value:
                    error: diagnosis session not found
        "503":
          description: Diagnosis auth transport wiring is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unconfigured:
                  value:
                    error: diagnosis auth is not configured
        "500":
          description: Ticket issuance failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: issue diagnosis WebSocket ticket failed
  /api/v1/diagnosis/rooms:
    post:
      operationId: createDiagnosisRoom
      summary: Create a diagnosis room
      description: Authenticates an OIDC bearer token, starts a short-conversation diagnosis room from a frozen EvidenceSnapshot, and returns the session identifier once the room is ready for WebSocket tickets.
      tags:
        - diagnosis
      requestBody:
        description: Evidence snapshot to diagnose.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosisRoomCreateRequest"
            examples:
              evidence:
                value:
                  evidence_snapshot_id: 7
      responses:
        "201":
          description: Diagnosis room created and ready for WebSocket ticket issuance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosisRoomCreateResponse"
              examples:
                created:
                  value:
                    session_id: diagnosis-session-42
                    evidence_snapshot_id: 7
                    diagnosis_task_id: 101
                    chat_session_id: 202
                    workflow_id: diagnosis-room-diagnosis-session-42
                    run_id: run-42
        "400":
          description: Room create request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: evidence_snapshot_id must be positive
        "401":
          description: Bearer token is missing, invalid, or lacks a principal subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthenticated:
                  value:
                    error: authentication failed
        "403":
          description: Authenticated principal cannot create a diagnosis room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        "404":
          description: Evidence snapshot was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not-found:
                  value:
                    error: evidence snapshot not found
        "503":
          description: Diagnosis room starter wiring is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unconfigured:
                  value:
                    error: diagnosis room starter is not configured
        "500":
          description: Room creation failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: create diagnosis room failed
  /api/v1/reports/{report_id}:
    get:
      operationId: getReport
      summary: Get final report detail
      description: Returns one final report with linked subreports for evidence traceability.
      tags:
        - reports
      parameters:
        - $ref: "#/components/parameters/ReportID"
      responses:
        "200":
          description: Final report detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalReportDetail"
              examples:
                report-detail:
                  value:
                    id: 11
                    correlation_key: window:checkout:2026-05-27T09:00:00Z
                    title: Checkout latency incident
                    executive_summary: Checkout latency increased after a deployment.
                    severity: warning
                    confidence: high
                    sub_reports:
                      - title: Checkout API latency
                        severity: warning
                        summary: p95 latency exceeded the warning threshold.
                    recommended_actions:
                      - label: Inspect deployment
                        detail: Compare checkout deployment timestamps with latency onset.
                        priority: high
                    notification_text: Checkout latency incident requires review.
                    content:
                      title: Checkout latency incident
                      executive_summary: Checkout latency increased after a deployment.
                    model: gpt-4.1-mini
                    output_mode: json_schema
                    created_by_workflow: FinalReportWorkflow
                    created_at: "2026-05-27T09:05:00Z"
                    linked_sub_reports:
                      - id: 21
                        evidence_snapshot_id: 7
                        scenario: single_alert
                        title: Checkout API latency
                        summary: p95 latency exceeded the warning threshold.
                        severity: warning
                        confidence: high
                        findings:
                          - label: High p95 latency
                            detail: p95 latency stayed above the warning threshold.
                            evidence_id: alert:checkout-latency
                        recommended_actions:
                          - label: Inspect deployment
                            detail: Compare checkout deployment timestamps with latency onset.
                            priority: high
                        evidence_refs:
                          - alert:checkout-latency
                        content:
                          title: Checkout API latency
                          summary: p95 latency exceeded the warning threshold.
                        model: gpt-4.1-mini
                        output_mode: json_schema
                        created_by_workflow: ReportFanOutWorkflow
                        created_at: "2026-05-27T09:04:00Z"
        "400":
          description: Report ID is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid-id:
                  value:
                    error: "report_id must be positive"
        "404":
          description: Report was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not-found:
                  value:
                    error: report not found
        "500":
          description: Report detail failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: get report failed

components:
  parameters:
    ListLimit:
      name: limit
      in: query
      description: Maximum number of rows to return.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 500
        default: 100
    ReportID:
      name: report_id
      in: path
      description: Final report identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    AlertSourceProfileID:
      name: source_id
      in: path
      description: Alert source profile identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    GroupingPolicyID:
      name: policy_id
      in: path
      description: Grouping policy identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ReportWorkflowPolicyID:
      name: policy_id
      in: path
      description: Report workflow policy identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ReportWorkflowScheduleID:
      name: schedule_id
      in: path
      description: Report workflow schedule identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    DiagnosisToolTemplateID:
      name: template_id
      in: path
      description: Diagnosis tool template identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    NotificationChannelProfileID:
      name: channel_id
      in: path
      description: Notification channel profile identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  schemas:
    HealthResponse:
      type: object
      description: Health check response payload.
      properties:
        status:
          type: string
          description: Current service status.
          examples:
            - "ok"
      required:
        - status
    DashboardSummary:
      type: object
      description: Operational summary for the web dashboard.
      properties:
        generated_at:
          type: string
          format: date-time
          examples:
            - "2026-05-28T05:00:00Z"
        alerts:
          allOf:
            - $ref: "#/components/schemas/DashboardAlertStats"
            - type: object
          examples:
            - total_recent: 20
              firing: 18
              resolved: 2
        reports:
          allOf:
            - $ref: "#/components/schemas/DashboardReportStats"
            - type: object
          examples:
            - total_recent: 8
              delivered: 7
              failed: 1
              pending: 0
              missing_delivery: 0
              success_rate: 0.875
              severity:
                info: 2
                warning: 5
                critical: 1
      required:
        - generated_at
        - alerts
        - reports
    DashboardAlertStats:
      type: object
      description: Alert counters from the recent alert-event window.
      properties:
        total_recent:
          type: integer
          format: int64
          minimum: 0
        firing:
          type: integer
          format: int64
          minimum: 0
        resolved:
          type: integer
          format: int64
          minimum: 0
      required:
        - total_recent
        - firing
        - resolved
    AlertSourceKind:
      type: string
      description: Supported alert source adapter kind.
      enum:
        - prometheus
        - alertmanager
      examples:
        - prometheus
    AlertSourceAuthMode:
      type: string
      description: Authentication mode for the alert source adapter.
      enum:
        - none
        - bearer
      examples:
        - bearer
    AlertSourceConnectionTestStatus:
      type: string
      description: Sanitized connection-test outcome category.
      enum:
        - success
        - failed
        - unsupported
        - blocked
      examples:
        - success
    AlertSourceConnectionTestReasonCode:
      type: string
      description: Stable machine-readable reason for the connection-test outcome.
      enum:
        - ok
        - unsupported_kind
        - credentials_unavailable
        - upstream_unreachable
        - upstream_error
        - invalid_profile
      examples:
        - ok
    AlertSourceLabels:
      type: object
      description: Operator labels for environment, ownership, or routing metadata.
      additionalProperties:
        type: string
      examples:
        - env: staging
          owner: platform
    AlertSourceProfile:
      type: object
      description: Operator-managed alert source profile without credential values.
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          examples:
            - 1
        name:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - Primary Prometheus
        kind:
          $ref: "#/components/schemas/AlertSourceKind"
        base_url:
          type: string
          format: uri
          maxLength: 2048
          description: HTTP(S) upstream endpoint root without userinfo, query, or fragment.
          examples:
            - https://prometheus.example.test
        auth_mode:
          $ref: "#/components/schemas/AlertSourceAuthMode"
        secret_ref:
          type: string
          maxLength: 256
          description: Deployment-managed credential reference; never the credential value.
          examples:
            - secret/openclarion/prometheus-bearer
        enabled:
          type: boolean
          description: Whether operators enabled this source for policy binding.
          examples:
            - true
        labels:
          $ref: "#/components/schemas/AlertSourceLabels"
        created_at:
          type: string
          format: date-time
          examples:
            - "2026-05-28T06:00:00Z"
        updated_at:
          type: string
          format: date-time
          examples:
            - "2026-05-28T06:10:00Z"
      required:
        - id
        - name
        - kind
        - base_url
        - auth_mode
        - secret_ref
        - enabled
        - labels
        - created_at
        - updated_at
    AlertSourceProfileWriteRequest:
      type: object
      description: Alert source profile metadata accepted by create and replace operations.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - Primary Prometheus
        kind:
          $ref: "#/components/schemas/AlertSourceKind"
        base_url:
          type: string
          format: uri
          maxLength: 2048
          description: Submitted HTTP(S) endpoint root without userinfo, query, or fragment.
          examples:
            - https://prometheus.example.test
        auth_mode:
          $ref: "#/components/schemas/AlertSourceAuthMode"
        secret_ref:
          type: string
          maxLength: 256
          description: Submitted deployment-managed credential reference; never the credential value.
          examples:
            - secret/openclarion/prometheus-bearer
        enabled:
          type: boolean
          default: false
        labels:
          $ref: "#/components/schemas/AlertSourceLabels"
      required:
        - name
        - kind
        - base_url
        - auth_mode
      additionalProperties: false
    AlertSourceConnectionTestResult:
      type: object
      description: Sanitized result for an explicit alert-source connectivity test.
      properties:
        source_id:
          type: integer
          format: int64
          minimum: 1
          examples:
            - 1
        kind:
          $ref: "#/components/schemas/AlertSourceKind"
        auth_mode:
          $ref: "#/components/schemas/AlertSourceAuthMode"
        status:
          $ref: "#/components/schemas/AlertSourceConnectionTestStatus"
