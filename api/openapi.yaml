    ReportWorkflowSchedule:
      type: object
      description: Operator-managed report workflow schedule metadata. Enabled state changes only through explicit action endpoints; configured runtime synchronizers may project persisted state into Temporal Schedule registration and pause state.
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          examples:
            - 1
        name:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - Daily report window
        report_workflow_policy_id:
          type: integer
          format: int64
          minimum: 1
          description: Bound report workflow policy identifier.
          examples:
            - 1
        temporal_schedule_id:
          type: string
          minLength: 1
          maxLength: 200
          description: Stable Temporal Schedule identifier used by runtime schedule synchronization.
          examples:
            - openclarion-report-policy-1-daily
        cadence:
          type: string
          description: Schedule cadence kind. Calendar cadences use UTC calendar fields; interval preserves fixed-period behavior.
          enum:
            - interval
            - daily
            - weekly
            - monthly
          examples:
            - daily
        calendar_hour:
          type: integer
          format: int32
          minimum: 0
          maximum: 23
          description: UTC hour used by daily, weekly, and monthly calendar cadences.
          examples:
            - 2
        calendar_minute:
          type: integer
          format: int32
          minimum: 0
          maximum: 59
          description: UTC minute used by daily, weekly, and monthly calendar cadences.
          examples:
            - 30
        calendar_day_of_week:
          type: integer
          format: int32
          minimum: 0
          maximum: 6
          description: UTC day of week for weekly cadence, where 0 is Sunday and 6 is Saturday. Must be 0 for other cadences.
          examples:
            - 1
        calendar_day_of_month:
          type: integer
          format: int32
          minimum: 0
          maximum: 28
          description: UTC day of month for monthly cadence. Monthly schedules accept 1-28 so every month has a matching fire time; must be 0 for other cadences.
          examples:
            - 1
        interval_seconds:
          type: integer
          format: int64
          minimum: 1
          maximum: 31536000
          description: Temporal fixed interval in whole seconds, or replay-window guard interval for calendar cadences.
          examples:
            - 86400
        offset_seconds:
          type: integer
          format: int64
          minimum: 0
          maximum: 31536000
          description: Temporal interval offset in whole seconds; must be less than interval_seconds. Calendar cadences require 0 because calendar_hour/calendar_minute define the fire time.
          examples:
            - 0
        replay_window_seconds:
          type: integer
          format: int64
          minimum: 1
          maximum: 31536000
          description: Alert replay window duration computed from the scheduled fire time.
          examples:
            - 3600
        replay_delay_seconds:
          type: integer
          format: int64
          minimum: 0
          maximum: 31536000
          description: Delay subtracted from the scheduled fire time before computing the replay window end.
          examples:
            - 300
        replay_limit:
          type: integer
          format: int32
          minimum: 1
          maximum: 100000
          description: Maximum alert events loaded by the later launcher workflow.
          examples:
            - 10000
        catchup_window_seconds:
          type: integer
          format: int64
          minimum: 1
          maximum: 31536000
          description: Bounded Temporal catch-up window in whole seconds.
          examples:
            - 3600
        enabled:
          type: boolean
          description: Whether operators explicitly enabled this schedule metadata.
          examples:
            - false
        enabled_at:
          type:
            - string
            - "null"
          format: date-time
          description: Time of the latest explicit enable action.
          examples:
            - "2026-06-06T02:05:00Z"
        disabled_at:
          type:
            - string
            - "null"
          format: date-time
          description: Time of the latest explicit disable action.
          examples:
            - null
        created_at:
          type: string
          format: date-time
          examples:
            - "2026-06-06T02:00:00Z"
        updated_at:
          type: string
          format: date-time
          examples:
            - "2026-06-06T02:10:00Z"
      required:
        - id
        - name
        - report_workflow_policy_id
        - temporal_schedule_id
        - cadence
        - calendar_hour
        - calendar_minute
        - calendar_day_of_week
        - calendar_day_of_month
        - interval_seconds
        - offset_seconds
        - replay_window_seconds
        - replay_delay_seconds
        - replay_limit
