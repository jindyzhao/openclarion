  /api/v1/diagnosis/wecom/app-callback:
    get:
      operationId: verifyDiagnosisWeComAppCallback
      summary: Verify Enterprise WeChat app callback URL
      description: Verifies the Enterprise WeChat application message callback challenge and returns the decrypted echo string as text/plain. The response never includes callback token, EncodingAESKey, raw encrypted payloads, or decrypted message bodies beyond the provider challenge echo.
      tags:
        - diagnosis
      parameters:
        - name: msg_signature
          in: query
          description: Enterprise WeChat callback signature.
          required: true
          schema:
            type: string
            maxLength: 512
        - name: timestamp
          in: query
          description: Enterprise WeChat callback timestamp.
          required: true
          schema:
            type: string
            maxLength: 512
        - name: nonce
          in: query
          description: Enterprise WeChat callback nonce.
          required: true
          schema:
            type: string
            maxLength: 512
        - name: echostr
          in: query
          description: Enterprise WeChat encrypted callback echo challenge.
          required: true
          schema:
            type: string
            maxLength: 65536
      responses:
        "200":
          description: Callback URL challenge verified
          content:
            text/plain:
              schema:
                type: string
              examples:
                verified:
                  value: callback-echo-token
        "400":
          description: Callback verification query is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: Enterprise WeChat app callback verification failed
        "503":
          description: Enterprise WeChat app callback verifier is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unconfigured:
                  value:
                    error: Enterprise WeChat app callback is not configured
    post:
      operationId: acceptDiagnosisWeComAppCallback
      summary: Accept Enterprise WeChat app callback message
      description: Verifies and decrypts one Enterprise WeChat application message callback, extracts the sender identity and message metadata for the server-side callback boundary, and acknowledges the provider without returning decrypted message content.
      tags:
        - diagnosis
      parameters:
        - name: msg_signature
          in: query
          description: Enterprise WeChat callback signature.
          required: true
          schema:
            type: string
            maxLength: 512
        - name: timestamp
          in: query
          description: Enterprise WeChat callback timestamp.
          required: true
          schema:
            type: string
            maxLength: 512
        - name: nonce
          in: query
          description: Enterprise WeChat callback nonce.
          required: true
          schema:
            type: string
            maxLength: 512
      requestBody:
        description: Enterprise WeChat encrypted XML callback body.
        required: true
        content:
          application/xml:
            schema:
              type: string
              maxLength: 65536
          text/xml:
            schema:
              type: string
              maxLength: 65536
      responses:
        "200":
          description: Callback message accepted
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - success
              examples:
                accepted:
                  value: success
        "400":
          description: Callback message query or body is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: Enterprise WeChat app callback message rejected
        "503":
          description: Enterprise WeChat app callback verifier is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unconfigured:
                  value:
                    error: Enterprise WeChat app callback is not configured
