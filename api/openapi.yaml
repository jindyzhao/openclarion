    DiagnosisAuthCheckResponse:
      type: object
      description: Sanitized diagnosis authentication principal summary.
      properties:
        subject:
          type: string
          minLength: 1
          description: Stable authenticated subject used by diagnosis-room ownership checks.
          examples:
            - operator-1
        roles:
          type: array
          description: Diagnosis authorization roles mapped by the configured auth provider. V1 roles are owner and admin.
          items:
            type: string
          examples:
            -
              - owner
        mode:
          type: string
          description: Configured diagnosis auth provider mode that accepted the credentials. none is never returned by a successful check.
          enum:
            - ldap
            - static
            - oidc
            - unknown
          examples:
            - ldap
        checked_at:
          type: string
          format: date-time
          description: Server-side timestamp when the credentials were checked.
          examples:
            - "2026-06-21T04:00:00Z"
        role_authorized:
          type: boolean
          description: Whether the mapped roles include owner or admin and can be used for diagnosis-room create/connect attempts.
          examples:
            - true
        tenant_id:
          type: integer
          format: int64
          minimum: 1
          description: Tenant bound to the authenticated request.
          examples:
            - 1
        tenant_key:
          type: string
          pattern: "^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$"
          maxLength: 63
          description: Stable key of the tenant bound to the authenticated request.
          examples:
            - default
      required:
        - subject
        - roles
        - mode
        - checked_at
        - role_authorized
        - tenant_id
        - tenant_key
    DiagnosisAuthSessionResponse:
      type: object
      description: Short-lived diagnosis browser session issued after accepted Authorization credentials. The token is intended only for the trusted browser BFF to store in an HTTP-only cookie and must not be exposed to page JavaScript.
      properties:
        token:
          type: string
          minLength: 1
          description: OpenClarion diagnosis bearer session token. The BFF stores this value in an HTTP-only cookie and does not expose it to the browser UI.
          examples:
            - openclarion.session.token
        subject:
          type: string
          minLength: 1
          description: Stable authenticated subject used by diagnosis-room ownership checks.
          examples:
            - operator-1
        roles:
          type: array
          description: Diagnosis authorization roles mapped by the configured auth provider. V1 roles are owner and admin.
          items:
            type: string
          examples:
            -
              - owner
        mode:
          type: string
          description: Diagnosis auth provider mode that accepted the credentials. none is never returned by a successful session issue.
          enum:
            - ldap
            - static
            - oidc
            - unknown
          examples:
            - ldap
        checked_at:
          type: string
          format: date-time
          description: Server-side timestamp when the credentials were checked.
          examples:
            - "2026-06-21T04:00:00Z"
        expires_at:
          type: string
          format: date-time
          description: Expiry time for the issued OpenClarion session token.
          examples:
            - "2026-06-21T12:00:00Z"
        role_authorized:
          type: boolean
          description: Whether the mapped roles include owner or admin and can be used for diagnosis-room create/connect attempts.
          examples:
            - true
        tenant_id:
          type: integer
          format: int64
          minimum: 1
          description: Tenant cryptographically bound into the session token.
          examples:
            - 1
        tenant_key:
          type: string
          pattern: "^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$"
          maxLength: 63
          description: Stable key cryptographically bound into the session token.
          examples:
            - default
      required:
        - token
        - subject
        - roles
        - mode
        - checked_at
        - expires_at
        - role_authorized
        - tenant_id
        - tenant_key
    DiagnosisAuthStatusResponse:
      type: object
      description: Non-sensitive diagnosis auth provider wiring status.
      properties:
        configured:
          type: boolean
          description: Whether diagnosis auth is wired in the running backend.
          examples:
            - true
        session_issuance_ready:
          type: boolean
          description: Whether the running backend can issue bounded diagnosis browser sessions. This reports wiring readiness only and does not expose signing material.
          examples:
            - true
        mode:
          type: string
          description: Configured diagnosis auth provider mode. none means no provider is wired; unknown means a provider was injected without a named mode.
          enum:
            - ldap
            - static
            - oidc
            - unknown
            - none
          examples:
            - ldap
        supported_modes:
          type: array
          description: Configured diagnosis auth modes accepted by the running backend.
          items:
            type: string
            enum:
              - ldap
              - static
              - oidc
              - unknown
          examples:
            - - oidc
        role_mapping:
          $ref: "#/components/schemas/DiagnosisAuthRoleMappingStatus"
        transport_policy:
          $ref: "#/components/schemas/DiagnosisAuthTransportPolicyStatus"
      required:
        - configured
        - session_issuance_ready
        - mode
    DiagnosisAuthTransportPolicyStatus:
      type: object
      description: Non-sensitive credential transport readiness summary. It reports only the security class and never includes endpoints, DNs, usernames, domains, certificates, or secrets.
      properties:
        security:
          type: string
          description: Credential transport security class accepted by the running backend.
          enum:
            - tls
            - start_tls
            - insecure_plaintext
          examples:
            - tls
      required:
        - security
    DiagnosisAuthRoleMappingStatus:
      type: object
      description: Non-sensitive owner/admin role mapping readiness summary. Counts indicate configured mapping paths only and never include upstream role values, user IDs, DNs, claims, endpoints, or secrets.
      properties:
        owner_mapping_count:
          type: integer
          minimum: 0
          description: Number of configured upstream mappings that grant OpenClarion owner access.
          examples:
            - 1
        admin_mapping_count:
          type: integer
          minimum: 0
          description: Number of configured upstream mappings that grant OpenClarion admin access.
          examples:
            - 1
        default_roles:
          type: array
          description: OpenClarion roles granted by default by the configured provider.
          items:
            type: string
            enum:
              - owner
              - admin
          examples:
            - ["owner"]
        configured:
          type: boolean
          description: Whether at least one owner/admin mapping path or default role is configured.
          examples:
            - true
      required:
        - owner_mapping_count
        - admin_mapping_count
        - default_roles
        - configured
    DiagnosisWSTicketRequest:
      type: object
      description: Request to issue a short-lived WebSocket ticket for a diagnosis session.
      properties:
        session_id:
          type: string
          minLength: 1
          description: Diagnosis session identifier to authorize.
          examples:
            - diagnosis-session-42
      required:
        - session_id
      additionalProperties: false
    DiagnosisWSTicketResponse:
      type: object
      description: Short-lived single-use WebSocket ticket. The ticket is returned only once and is never stored in raw form.
      properties:
        ticket:
          type: string
          minLength: 1
          description: URL-safe opaque single-use ticket for the WebSocket query string.
          examples:
            - b64url-single-use-ticket
        session_id:
          type: string
          minLength: 1
          description: Diagnosis session the ticket authorizes.
          examples:
            - diagnosis-session-42
        expires_at:
          type: string
          format: date-time
          description: Ticket expiry time; V1 hard cap is 30 seconds after issuance.
          examples:
            - "2026-05-28T10:00:30Z"
      required:
        - ticket
        - session_id
        - expires_at
    ReportReplayTriggerRequest:
      type: object
      description: Request to replay an alert window and trigger report generation.
      properties:
        window_start:
          type: string
          format: date-time
          description: Inclusive replay window start.
          examples:
            - "2026-05-27T09:00:00Z"
        window_end:
          type: string
          format: date-time
          description: Exclusive replay window end.
          examples:
            - "2026-05-27T10:00:00Z"
        limit:
          type: integer
          format: int32
          minimum: 1
          maximum: 100000
          default: 10000
          description: Maximum number of alert events to load from the window.
        alert_event_id:
          type: integer
          format: int64
          minimum: 1
          description: Optional persisted AlertEvent ID to constrain a row-level replay to the selected alert.
          examples:
            - 42
        correlation_key:
          type: string
          description: Optional final-report idempotency key. Defaults to the normalized replay window.
          examples:
            - incident-window-20260527T0900Z
        workflow_id:
          type: string
          description: Optional Temporal workflow ID. Defaults to a stable hash of the correlation key.
          examples:
            - report-batch-0bf4f5e1a8cb2d3299dcb4d280d5a6a0
        scenario:
          type: string
          description: Report prompt scenario used for generated SubReports.
          enum:
            - single_alert
            - cascade
            - alert_storm
          examples:
            - single_alert
      required:
        - window_start
        - window_end
      additionalProperties: false
    ReportReplayTriggerResponse:
      type: object
      description: Result of replaying an alert window and optionally starting report generation.
      properties:
        started:
          type: boolean
          description: True when at least one EvidenceSnapshot was available and workflow start was accepted.
          examples:
            - true
        correlation_key:
          type: string
          description: Final report correlation key used by the replayed report workflow and downstream delivery proof.
          examples:
            - incident-window-20260527T0900Z
        workflow_id:
          type: string
          description: Started workflow ID, or empty when no snapshots were available.
          examples:
            - report-batch-0bf4f5e1a8cb2d3299dcb4d280d5a6a0
        run_id:
          type: string
          description: Started workflow run ID, or empty when no snapshots were available.
          examples:
            - 7a2a1f6f-f114-4f6d-92d7-9b59f1c9f6f4
        stats:
          $ref: "#/components/schemas/ReportReplayStats"
        snapshots:
          type: array
          examples:
            - - id: 7
                group_index: 0
                event_count: 5
          items:
            $ref: "#/components/schemas/ReportReplaySnapshotRef"
        auto_diagnosis:
          $ref: "#/components/schemas/AlertmanagerWebhookAutoDiagnosisSummary"
      required:
        - started
        - correlation_key
        - workflow_id
        - run_id
        - stats
        - snapshots
