    AlertmanagerWebhookPayload:
      type: object
      description: Alertmanager webhook receiver payload accepted for alert ingestion.
      properties:
        version:
          type: string
          enum:
            - "4"
          examples:
            - "4"
        groupKey:
          type: string
          examples:
            - '{}:{alertname="HighCPU"}'
        truncatedAlerts:
          type: integer
          format: int64
          minimum: 0
          default: 0
          examples:
            - 0
        status:
          type: string
          enum:
            - firing
            - resolved
          examples:
            - firing
        receiver:
          type: string
          examples:
            - openclarion
        groupLabels:
          type: object
          additionalProperties:
            type: string
          examples:
            - alertname: HighCPU
        commonLabels:
          type: object
          additionalProperties:
            type: string
          examples:
            - severity: warning
        commonAnnotations:
          type: object
          additionalProperties:
            type: string
          examples:
            - summary: CPU high
        externalURL:
          type: string
          examples:
            - https://alertmanager.example.test
        alerts:
          type: array
          maxItems: 10000
          items:
            $ref: "#/components/schemas/AlertmanagerWebhookAlert"
          examples:
            - - status: firing
                labels:
                  alertname: HighCPU
                  instance: api-1
                annotations:
                  summary: CPU high
                startsAt: "2026-06-06T01:00:00Z"
      required:
        - version
        - status
        - alerts
      additionalProperties: false
    AlertmanagerWebhookAlert:
      type: object
      description: Single alert entry inside an Alertmanager webhook payload.
      properties:
        status:
          type: string
          enum:
            - firing
            - resolved
          examples:
            - firing
        labels:
          type: object
          additionalProperties:
            type: string
          examples:
            - alertname: HighCPU
              instance: api-1
        annotations:
          type: object
          additionalProperties:
            type: string
          examples:
            - summary: CPU high
        startsAt:
          type: string
          format: date-time
          examples:
            - "2026-06-06T01:00:00Z"
        endsAt:
          type: string
          format: date-time
          description: Required and non-zero when status is resolved; ignored for firing ingestion.
          examples:
            - "0001-01-01T00:00:00Z"
        generatorURL:
          type: string
          examples:
            - https://prometheus.example.test/graph
        fingerprint:
          type: string
          examples:
            - abc123
        silencedBy:
          type: array
          description: Optional Alertmanager API suppression references; firing alerts with entries here are ignored by webhook ingestion.
          items:
            type: string
          examples:
            - - silence-1
        inhibitedBy:
          type: array
          description: Optional Alertmanager API inhibition references; firing alerts with entries here are ignored by webhook ingestion.
          items:
            type: string
          examples:
            - - inhibit-1
        mutedBy:
          type: array
          description: Optional Alertmanager API mute references; firing alerts with entries here are ignored by webhook ingestion.
          items:
            type: string
          examples:
            - - mute-1
      required:
        - status
        - labels
        - annotations
        - startsAt
      additionalProperties: false
    AlertmanagerWebhookIngestResponse:
      type: object
      description: Sanitized counters from Alertmanager webhook ingestion.
      properties:
        source_id:
          type: integer
          format: int64
          examples:
            - 2
        received:
          type: integer
          format: int64
          examples:
            - 2
        resolved:
          type: integer
          format: int64
          description: Resolved entries applied to matching AlertEvent rows, including idempotent repeated deliveries.
          examples:
            - 1
        skipped_resolved:
          type: integer
          format: int64
          description: Resolved entries skipped because no matching persisted firing AlertEvent exists.
          examples:
            - 1
        skipped_suppressed:
          type: integer
          format: int64
          description: Firing alert entries ignored because Alertmanager marked them silenced, inhibited, or muted.
          examples:
            - 2
        truncated_alerts:
          type: integer
          format: int64
          examples:
            - 0
        ingested:
          type: object
          description: Counter summary from webhook alert ingestion.
          properties:
            total:
              type: integer
              format: int64
            saved:
              type: integer
              format: int64
