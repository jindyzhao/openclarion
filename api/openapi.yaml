          description: Report detail failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: get report failed
  /api/v1/reports/{report_id}/notification/retry:
    post:
      operationId: retryReportNotification
      summary: Retry report notification
      description: Authenticates and authorizes a local report-workflow manager, sends or retries a persisted report notification as either a diagnosis handoff or an operator-confirmed final report notification, and returns delivery proof plus whether this call sent a provider request or returned an existing in-flight/completed proof.
      tags:
        - reports
      parameters:
        - $ref: "#/components/parameters/ReportID"
      requestBody:
        description: Optional notification channel and purpose override for the retry attempt.
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportNotificationRetryRequest"
            examples:
              profile:
                value:
                  report_notification_channel_profile_id: 2
                  notification_purpose: handoff
              final:
                value:
                  report_notification_channel_profile_id: 2
                  notification_purpose: final
              fallback:
                value: {}
      responses:
        "200":
          description: Report notification retry completed or existing delivery proof was returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportNotificationRetryResponse"
              examples:
                delivered:
                  value:
                    retry_state: sent
                    delivery:
                      id: 31
                      idempotency_key: final_report:11/notification/final
                      notification_purpose: final
                      report_notification_channel_profile_id: 2
                      status: delivered
                      provider_message_id: msg-31
                      provider_status: accepted
                      delivered_at: "2026-05-27T09:10:10Z"
                      created_at: "2026-05-27T09:05:00Z"
                      updated_at: "2026-05-27T09:10:10Z"
                pending:
                  value:
                    retry_state: already_pending
                    delivery:
                      id: 32
                      idempotency_key: final_report:11/notification/final
                      notification_purpose: final
                      report_notification_channel_profile_id: 2
                      status: pending
                      created_at: "2026-05-27T09:05:00Z"
                      updated_at: "2026-05-27T09:05:00Z"
        "400":
          description: Retry request is invalid or notification configuration is unusable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: report notification retry failed
        "401":
          description: Report notification retry credentials are missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthenticated:
                  value:
                    error: authentication failed
        "403":
          description: Authenticated principal cannot retry report notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        "503":
          description: Report notification retry wiring is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unconfigured:
                  value:
                    error: report notification retry is not configured
        "500":
          description: Retry failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                provider-error:
                  value:
                    error: retry report notification failed

  /api/v1/tenants:
    get:
      operationId: listAccessibleTenants
      summary: List tenants visible to the authenticated subject
      description: Returns the default tenant plus membership-visible tenants. Disabled tenants remain visible for lifecycle administration but cannot receive a new authenticated session.
      tags:
        - tenants
      responses:
        "200":
          description: Tenants visible to the subject, including disabled memberships for lifecycle administration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
              examples:
                visible-workspaces:
                  value:
                    items:
                      - id: 1
                        key: default
                        name: Default
                        status: active
                        created_at: "2026-07-11T10:00:00Z"
                        updated_at: "2026-07-11T10:00:00Z"
                      - id: 2
                        key: platform
                        name: Platform
                        status: disabled
                        created_at: "2026-07-11T10:05:00Z"
                        updated_at: "2026-07-11T11:00:00Z"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Tenant list failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTenant
      summary: Create a tenant and owner membership
      description: Restricted to configured bootstrap administrators because tenant creation changes the global isolation registry.
      tags:
        - tenants
      requestBody:
        description: Stable tenant key and operator-facing workspace name.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantCreateRequest"
            examples:
              platform:
                value:
                  key: platform
                  name: Platform
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
              examples:
                created:
                  value:
                    id: 2
                    key: platform
                    name: Platform
                    status: active
                    created_at: "2026-07-11T10:05:00Z"
                    updated_at: "2026-07-11T10:05:00Z"
        "400":
          description: Tenant request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Global tenant creation is not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tenant key already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Tenant creation failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/tenants/{tenant_id}:
    patch:
      operationId: updateTenantStatus
      summary: Update tenant lifecycle status
      description: Enables or disables a non-default tenant after tenant-owner or bootstrap-admin authorization.
      tags:
        - tenants
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        description: Desired tenant lifecycle status.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantStatusUpdateRequest"
            examples:
              disable:
                value:
                  status: disabled
      responses:
        "200":
          description: Tenant status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
              examples:
                disabled:
                  value:
                    id: 2
                    key: platform
                    name: Platform
                    status: disabled
                    created_at: "2026-07-11T10:05:00Z"
                    updated_at: "2026-07-11T11:00:00Z"
        "400":
          description: Tenant status request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Tenant administration is not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The requested lifecycle transition violates tenant invariants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Tenant update failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/tenants/{tenant_id}/memberships:
    get:
      operationId: listTenantMemberships
      summary: List tenant memberships
      description: Returns bounded membership records after tenant-owner or bootstrap-admin authorization.
      tags:
        - tenants
      parameters:
        - $ref: "#/components/parameters/TenantID"
      responses:
        "200":
          description: Tenant memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMembershipListResponse"
              examples:
                owners:
                  value:
                    items:
                      - id: 3
                        tenant_id: 2
                        subject: operator-1
                        role: owner
                        enabled: true
                        created_by: bootstrap-1
                        created_at: "2026-07-11T10:05:00Z"
                        updated_at: "2026-07-11T10:05:00Z"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Tenant administration is not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Tenant membership list failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: setTenantMembership
      summary: Create or update a tenant membership
      description: Upserts one subject membership while preserving at least one enabled tenant owner.
      tags:
        - tenants
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        description: Stable authentication subject, tenant role, and enabled state.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantMembershipWriteRequest"
            examples:
              responder:
                value:
                  subject: operator-2
                  role: member
                  enabled: true
      responses:
        "200":
          description: Tenant membership saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMembership"
              examples:
                saved:
                  value:
                    id: 4
                    tenant_id: 2
                    subject: operator-2
                    role: member
                    enabled: true
                    created_by: operator-1
                    created_at: "2026-07-11T11:10:00Z"
                    updated_at: "2026-07-11T11:10:00Z"
        "400":
          description: Tenant membership request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Tenant administration is not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Membership update would remove the last enabled owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Tenant membership update failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    ListLimit:
      name: limit
      in: query
      description: Maximum number of rows to return.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 500
        default: 100
    TenantID:
      name: tenant_id
      in: path
      description: Tenant identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    TenantKeyHeader:
      name: X-OpenClarion-Tenant
      in: header
      description: Optional tenant workspace selection. Signed browser sessions cannot be overridden on normal requests; session issuance may exchange a valid session into another accessible tenant without extending its expiry. Non-default machine ingress still requires a bearer-authenticated source profile.
      required: false
      schema:
        type: string
        pattern: "^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$"
        maxLength: 63
    ReportID:
      name: report_id
      in: path
      description: Final report identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    AlertSourceProfileID:
      name: source_id
      in: path
      description: Alert source profile identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    GroupingPolicyID:
      name: policy_id
      in: path
      description: Grouping policy identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ReportWorkflowPolicyID:
      name: policy_id
      in: path
      description: Report workflow policy identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    ReportWorkflowScheduleID:
      name: schedule_id
      in: path
      description: Report workflow schedule identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    DiagnosisToolTemplateID:
      name: template_id
      in: path
      description: Diagnosis tool template identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    NotificationChannelProfileID:
      name: channel_id
      in: path
      description: Notification channel profile identifier.
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    DirectoryProvider:
      name: provider
      in: query
      description: Optional local directory provider filter.
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 64
      examples:
        ops-iam:
          value: ops_iam
  schemas:
    Tenant:
      type: object
      description: One isolated OpenClarion workspace and its lifecycle state.
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          examples:
            - 2
        key:
          type: string
          pattern: "^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$"
          maxLength: 63
          examples:
            - platform
        name:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - Platform
        status:
          type: string
          enum:
            - active
            - disabled
          examples:
            - active
        created_at:
          type: string
          format: date-time
          examples:
            - "2026-07-11T10:05:00Z"
        updated_at:
          type: string
          format: date-time
          examples:
            - "2026-07-11T11:00:00Z"
      required:
        - id
        - key
        - name
        - status
        - created_at
        - updated_at
    TenantListResponse:
      type: object
      description: Bounded tenant registry view for an authenticated subject.
      additionalProperties: false
      properties:
        items:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/Tenant"
          examples:
            - - id: 1
                key: default
                name: Default
                status: active
                created_at: "2026-07-11T10:00:00Z"
                updated_at: "2026-07-11T10:00:00Z"
      required:
        - items
    TenantCreateRequest:
      type: object
      description: Bootstrap-admin request to create an active tenant and owner membership.
      additionalProperties: false
      properties:
        key:
          type: string
          pattern: "^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$"
          maxLength: 63
          examples:
            - platform
        name:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - Platform
      required:
        - key
        - name
    TenantStatusUpdateRequest:
      type: object
      description: Tenant lifecycle transition requested by an authorized owner.
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
            - active
            - disabled
          examples:
            - disabled
      required:
        - status
    TenantMembership:
      type: object
      description: One stable authentication subject's role in a tenant.
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          examples:
            - 3
        tenant_id:
          type: integer
          format: int64
          minimum: 1
          examples:
            - 2
        subject:
          type: string
          minLength: 1
          maxLength: 256
          examples:
            - operator-1
        role:
          type: string
          enum:
            - owner
            - member
          examples:
            - owner
        enabled:
          type: boolean
          examples:
            - true
        created_by:
          type: string
          minLength: 1
          maxLength: 256
          examples:
            - bootstrap-1
        created_at:
          type: string
          format: date-time
          examples:
            - "2026-07-11T10:05:00Z"
        updated_at:
          type: string
          format: date-time
          examples:
            - "2026-07-11T10:05:00Z"
      required:
        - id
        - tenant_id
        - subject
        - role
        - enabled
        - created_by
        - created_at
        - updated_at
    TenantMembershipListResponse:
      type: object
      description: Bounded membership list for one tenant.
      additionalProperties: false
      properties:
        items:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/TenantMembership"
          examples:
            - - id: 3
                tenant_id: 2
                subject: operator-1
                role: owner
                enabled: true
                created_by: bootstrap-1
                created_at: "2026-07-11T10:05:00Z"
                updated_at: "2026-07-11T10:05:00Z"
      required:
        - items
    TenantMembershipWriteRequest:
      type: object
      description: Authorized tenant membership create or update request.
      additionalProperties: false
      properties:
        subject:
          type: string
          minLength: 1
          maxLength: 256
          examples:
            - operator-2
        role:
          type: string
          enum:
            - owner
            - member
          examples:
            - member
        enabled:
          type: boolean
          examples:
            - true
      required:
        - subject
        - role
        - enabled
    HealthResponse:
      type: object
      description: Health check response payload.
      properties:
        status:
          type: string
          description: Current service status.
          examples:
            - "ok"
      required:
        - status
    DashboardSummary:
      type: object
      description: Operational summary for the web dashboard.
      properties:
        generated_at:
          type: string
          format: date-time
          examples:
            - "2026-05-28T05:00:00Z"
        alerts:
          allOf:
            - $ref: "#/components/schemas/DashboardAlertStats"
            - type: object
          examples:
            - total_recent: 20
              firing: 18
              resolved: 2
        diagnosis:
          allOf:
            - $ref: "#/components/schemas/DashboardDiagnosisStats"
            - type: object
          examples:
            - linked_snapshots: 6
              rooms_started: 4
              snapshots_needing_room: 2
              affected_alerts_needing_room: 2
        reports:
          allOf:
            - $ref: "#/components/schemas/DashboardReportStats"
            - type: object
          examples:
            - total_recent: 8
              delivered: 7
              failed: 1
              pending: 0
              missing_delivery: 0
              success_rate: 0.875
              severity:
                info: 2
                warning: 5
                critical: 1
      required:
        - generated_at
        - alerts
        - diagnosis
        - reports
    DashboardAlertStats:
      type: object
      description: Alert counters from the recent alert-event window.
      properties:
        total_recent:
          type: integer
          format: int64
          minimum: 0
        firing:
          type: integer
          format: int64
          minimum: 0
        resolved:
          type: integer
          format: int64
          minimum: 0
      required:
        - total_recent
        - firing
        - resolved
    DashboardDiagnosisStats:
      type: object
      description: AI diagnosis counters mapped from the recent alert-event window.
      properties:
        linked_snapshots:
          type: integer
          format: int64
          minimum: 0
          description: Evidence snapshots linked to recent alert events.
        rooms_started:
          type: integer
          format: int64
          minimum: 0
          description: Diagnosis rooms linked to those evidence snapshots.
        snapshots_needing_room:
          type: integer
          format: int64
          minimum: 0
          description: Linked evidence snapshots that do not have a diagnosis room yet.
        affected_alerts_needing_room:
          type: integer
          format: int64
          minimum: 0
          description: Recent alert events with at least one linked evidence snapshot that needs a diagnosis room.
      required:
        - linked_snapshots
        - rooms_started
        - snapshots_needing_room
        - affected_alerts_needing_room
    AlertSourceKind:
      type: string
      description: Supported alert source adapter kind.
      enum:
        - prometheus
        - alertmanager
      examples:
        - prometheus
    AlertSourceAuthMode:
      type: string
      description: Authentication mode for the alert source adapter.
      enum:
        - none
        - bearer
      examples:
        - bearer
    AlertSourceConnectionTestStatus:
      type: string
      description: Sanitized connection-test outcome category.
      enum:
        - success
        - failed
        - unsupported
        - blocked
      examples:
        - success
    AlertSourceConnectionTestReasonCode:
      type: string
      description: Stable machine-readable reason for the connection-test outcome.
      enum:
        - ok
        - unsupported_kind
        - capability_unavailable
        - credentials_unavailable
        - upstream_unreachable
        - upstream_error
        - invalid_profile
      examples:
        - ok
    AlertSourceLabels:
      type: object
      description: Operator labels for environment, ownership, or routing metadata.
      additionalProperties:
        type: string
      examples:
        - env: staging
          owner: platform
    AlertSourceProfile:
      type: object
      description: Operator-managed alert source profile without credential values.
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          examples:
            - 1
        name:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - Primary Prometheus
        kind:
          $ref: "#/components/schemas/AlertSourceKind"
        base_url:
          type: string
          format: uri
          maxLength: 2048
          description: HTTP(S) upstream endpoint root without userinfo, query, or fragment.
          examples:
            - https://prometheus.example.test
        auth_mode:
          $ref: "#/components/schemas/AlertSourceAuthMode"
        secret_ref:
          type: string
          maxLength: 256
          description: Deployment-managed credential reference; never the credential value.
          examples:
            - secret/openclarion/prometheus-bearer
        enabled:
          type: boolean
          description: Whether operators enabled this source for policy binding.
          examples:
            - true
        labels:
          $ref: "#/components/schemas/AlertSourceLabels"
        created_at:
          type: string
          format: date-time
          examples:
            - "2026-05-28T06:00:00Z"
        updated_at:
          type: string
          format: date-time
          examples:
            - "2026-05-28T06:10:00Z"
      required:
        - id
        - name
        - kind
        - base_url
        - auth_mode
        - secret_ref
        - enabled
        - labels
        - created_at
        - updated_at
    AlertSourceProfileWriteRequest:
      type: object
      description: Alert source profile metadata accepted by create and replace operations.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - Primary Prometheus
        kind:
          $ref: "#/components/schemas/AlertSourceKind"
        base_url:
          type: string
          format: uri
          maxLength: 2048
          description: Submitted HTTP(S) endpoint root without userinfo, query, or fragment.
          examples:
            - https://prometheus.example.test
        auth_mode:
          $ref: "#/components/schemas/AlertSourceAuthMode"
        secret_ref:
          type: string
          maxLength: 256
          description: Submitted deployment-managed credential reference; never the credential value.
          examples:
            - secret/openclarion/prometheus-bearer
        enabled:
          type: boolean
          default: false
        labels:
          $ref: "#/components/schemas/AlertSourceLabels"
      required:
        - name
        - kind
        - base_url
        - auth_mode
      additionalProperties: false
    AlertSourceConnectionTestResult:
      type: object
      description: Sanitized result for an explicit alert-source connectivity test.
      properties:
        source_id:
          type: integer
          format: int64
          minimum: 1
          examples:
            - 1
        kind:
          $ref: "#/components/schemas/AlertSourceKind"
        auth_mode:
          $ref: "#/components/schemas/AlertSourceAuthMode"
        status:
          $ref: "#/components/schemas/AlertSourceConnectionTestStatus"
        reason_code:
          $ref: "#/components/schemas/AlertSourceConnectionTestReasonCode"
        message:
          type: string
          minLength: 1
          maxLength: 240
          description: Operator-facing sanitized message. It must not include endpoints, secret references, tokens, or raw upstream error text.
