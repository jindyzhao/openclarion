openapi: "3.1.0"
info:
  title: OpenClarion API
  description: |
    Natural-language-driven alert governance platform.
    This specification is the single source of truth for all API contracts.
  version: 0.1.0
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: system
    description: System-level endpoints such as health checks and readiness probes.
  - name: alerts
    description: Alert event read models.
  - name: evidence
    description: Evidence snapshot read models.
  - name: reports
    description: Final report and subreport read models.
  - name: diagnosis
    description: Short-conversation diagnosis room authentication and transport bootstrap.
  - name: operations
    description: Operational dashboard read models.
  - name: config
    description: Operator-managed alert source and workflow configuration.
  - name: tenants
    description: Tenant lifecycle, membership, and authenticated workspace selection.

paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Health check endpoint
      description: Returns service health status. Used by orchestrators and load balancers.
      tags:
        - system
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
  /api/v1/dashboard:
    get:
      operationId: getDashboard
      summary: Get operational dashboard summary
      description: Authenticates and authorizes a local operations reader, then returns a bounded operational summary for recent alerts and final report delivery outcomes.
      tags:
        - operations
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
              examples:
                dashboard:
                  value:
                    generated_at: "2026-05-28T05:00:00Z"
                    alerts:
                      total_recent: 20
                      firing: 18
                      resolved: 2
                    diagnosis:
                      linked_snapshots: 6
                      rooms_started: 4
                      snapshots_needing_room: 2
                      affected_alerts_needing_room: 2
                    reports:
                      total_recent: 8
                      delivered: 7
                      failed: 1
                      pending: 0
                      missing_delivery: 0
                      success_rate: 0.875
                      severity:
                        info: 2
                        warning: 5
                        critical: 1
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not authorized to read operational data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Dashboard summary failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                failed:
                  value:
                    error: dashboard summary failed
  /api/v1/config/alert-sources:
    get:
      operationId: listAlertSourceProfiles
      summary: List alert source profiles
      description: Returns operator-managed alert source profiles without credential values.
      tags:
        - config
      parameters:
        - $ref: "#/components/parameters/ListLimit"
      responses:
        "200":
          description: Alert source profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSourceProfileListResponse"
              examples:
                profiles:
                  value:
                    items:
                      - id: 1
                        name: Primary Prometheus
                        kind: prometheus
                        base_url: https://prometheus.example.test
                        auth_mode: bearer
                        secret_ref: secret/openclarion/prometheus-bearer
                        enabled: false
                        labels:
                          env: staging
                        created_at: "2026-06-05T03:00:00Z"
                        updated_at: "2026-06-05T03:00:00Z"
        "400":
          description: Alert source list parameters are invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid-limit:
                  value:
                    error: "limit must be between 1 and 500"
        "500":
          description: Alert source list failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: list alert source profiles failed
    post:
      operationId: createAlertSourceProfile
      summary: Create an alert source profile
      description: Stores operator-managed alert source metadata. Secret material must be represented only by secret_ref.
      tags:
        - config
      requestBody:
        description: Alert source profile metadata.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertSourceProfileWriteRequest"
            examples:
              prometheus:
                value:
                  name: Primary Prometheus
                  kind: prometheus
                  base_url: https://prometheus.example.test
                  auth_mode: bearer
                  secret_ref: secret/openclarion/prometheus-bearer
                  enabled: false
                  labels:
                    env: staging
      responses:
        "201":
          description: Alert source profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSourceProfile"
              examples:
                created:
                  value:
                    id: 1
                    name: Primary Prometheus
                    kind: prometheus
                    base_url: https://prometheus.example.test
                    auth_mode: bearer
                    secret_ref: secret/openclarion/prometheus-bearer
                    enabled: false
                    labels:
                      env: staging
                    created_at: "2026-05-28T06:00:00Z"
                    updated_at: "2026-05-28T06:00:00Z"
        "400":
          description: Alert source profile request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: "alert source profile: base_url must not include userinfo"
        "409":
          description: Alert source profile conflicts with an existing profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                duplicate:
                  value:
                    error: alert source profile already exists
        "500":
          description: Alert source profile creation failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: create alert source profile failed
  /api/v1/config/alert-sources/{source_id}:
    get:
      operationId: getAlertSourceProfile
      summary: Get an alert source profile
      description: Returns one operator-managed alert source profile without credential values.
      tags:
        - config
      parameters:
        - $ref: "#/components/parameters/AlertSourceProfileID"
      responses:
        "200":
          description: Alert source profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSourceProfile"
              examples:
                profile:
                  value:
                    id: 1
                    name: Primary Prometheus
                    kind: prometheus
                    base_url: https://prometheus.example.test
                    auth_mode: bearer
                    secret_ref: secret/openclarion/prometheus-bearer
                    enabled: true
                    labels:
                      env: prod
                    created_at: "2026-05-28T06:00:00Z"
                    updated_at: "2026-05-28T06:00:00Z"
        "404":
          description: Alert source profile was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not-found:
                  value:
                    error: alert source profile not found
        "500":
          description: Alert source profile lookup failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: get alert source profile failed
    put:
      operationId: replaceAlertSourceProfile
      summary: Replace an alert source profile
      description: Replaces mutable alert source profile metadata. Use enabled=false to disable a source.
      tags:
        - config
      parameters:
        - $ref: "#/components/parameters/AlertSourceProfileID"
      requestBody:
        description: Replacement alert source profile metadata.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertSourceProfileWriteRequest"
            examples:
              disable-source:
                value:
                  name: Primary Prometheus
                  kind: prometheus
                  base_url: https://prometheus.example.test
                  auth_mode: bearer
                  secret_ref: secret/openclarion/prometheus-bearer
                  enabled: false
                  labels:
                    env: prod
      responses:
        "200":
          description: Alert source profile replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSourceProfile"
              examples:
                replaced:
                  value:
                    id: 1
                    name: Primary Prometheus
                    kind: prometheus
                    base_url: https://prometheus.example.test
                    auth_mode: bearer
                    secret_ref: secret/openclarion/prometheus-bearer
                    enabled: false
                    labels:
                      env: prod
                    created_at: "2026-05-28T06:00:00Z"
                    updated_at: "2026-05-28T06:10:00Z"
        "400":
          description: Alert source profile replacement request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: "alert source profile: bearer auth requires secret_ref"
        "404":
          description: Replacement target profile was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not-found:
                  value:
                    error: alert source profile not found
        "409":
          description: Replacement profile conflicts with an existing name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                duplicate:
                  value:
                    error: alert source profile already exists
        "500":
          description: Alert source profile replacement failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: replace alert source profile failed
  /api/v1/config/alert-sources/{source_id}/test:
    post:
      operationId: testAlertSourceProfileConnection
      summary: Test an alert source profile connection
      description: Performs a bounded backend connectivity test for a persisted alert source profile and returns sanitized status only.
      tags:
        - config
      parameters:
        - $ref: "#/components/parameters/AlertSourceProfileID"
      responses:
        "200":
          description: Sanitized alert source connection-test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertSourceConnectionTestResult"
              examples:
                success:
                  value:
                    source_id: 1
                    kind: prometheus
                    auth_mode: none
                    status: success
                    reason_code: ok
                    message: Prometheus alert listing succeeded.
                    checked_at: "2026-06-05T04:00:00Z"
                    observed_alerts: 2
                blocked:
                  value:
                    source_id: 2
                    kind: prometheus
                    auth_mode: bearer
                    status: blocked
                    reason_code: credentials_unavailable
                    message: Secret-backed connection tests require a server-side secret resolver.
                    checked_at: "2026-06-05T04:00:00Z"
                    observed_alerts: 0
        "400":
          description: Alert source connection-test request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: source_id must be positive
        "404":
          description: Alert source profile was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not-found:
                  value:
                    error: alert source profile not found
        "503":
          description: Alert source connection tester is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unconfigured:
                  value:
                    error: alert source connection tester is not configured
        "500":
          description: Alert source connection test failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: test alert source connection failed
  /api/v1/alert-sources/{source_id}/webhooks/alertmanager:
    post:
      operationId: ingestAlertmanagerWebhook
      summary: Ingest an Alertmanager webhook payload
      description: >-
        Accepts a version 4 Alertmanager webhook receiver payload for an enabled
        Alertmanager alert-source profile, persists firing alerts, applies
        resolved entries to matching AlertEvent rows, starts automatic diagnosis
        rooms only for firing alerts under enabled auto_room policies, and
        returns sanitized counters without starting report workflows. Ingress
        for a non-default tenant requires bearer authentication on the selected
        alert-source profile.
      tags:
        - alerts
      parameters:
        - $ref: "#/components/parameters/AlertSourceProfileID"
        - $ref: "#/components/parameters/TenantKeyHeader"
      requestBody:
        description: Alertmanager webhook receiver payload.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertmanagerWebhookPayload"
            examples:
              firing:
                value:
                  version: "4"
                  groupKey: '{}:{alertname="HighCPU"}'
                  truncatedAlerts: 0
                  status: firing
                  receiver: openclarion
                  groupLabels:
                    alertname: HighCPU
                  commonLabels:
                    severity: warning
                  commonAnnotations:
                    summary: CPU high
                  externalURL: https://alertmanager.example.test
                  alerts:
                    - status: firing
                      labels:
                        alertname: HighCPU
                        instance: api-1
                        severity: warning
                      annotations:
                        summary: CPU high
                      startsAt: "2026-06-06T01:00:00Z"
                      endsAt: "0001-01-01T00:00:00Z"
                      generatorURL: https://prometheus.example.test/graph
                      fingerprint: abc123
      responses:
        "202":
          description: Webhook payload was accepted and alert lifecycle entries were ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertmanagerWebhookIngestResponse"
              examples:
                accepted:
                  value:
                    source_id: 2
                    received: 3
                    resolved: 1
                    skipped_resolved: 1
                    skipped_suppressed: 0
                    truncated_alerts: 0
                    ingested:
                      total: 1
                      saved: 1
                      duplicate: 0
                      failed: 0
                    auto_diagnosis:
                      policies_matched: 1
                      snapshots: 1
                      rooms_started: 1
                      rooms_skipped: 0
                      skipped_snapshot_ids: []
        "400":
          description: Webhook request or payload is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: alertmanager webhook payload is invalid
        "401":
          description: Webhook authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unauthorized:
                  value:
                    error: alertmanager webhook authorization failed
        "404":
          description: Alert source profile was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                not-found:
                  value:
                    error: alert source profile not found
        "503":
          description: Webhook ingest wiring or credentials are not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unconfigured:
                  value:
                    error: alertmanager webhook ingest is not configured
        "500":
          description: Alertmanager webhook ingest failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: ingest alertmanager webhook failed
  /api/v1/config/grouping-policies:
    get:
      operationId: listGroupingPolicies
      summary: List grouping policies
      description: Returns operator-managed grouping policies.
      tags:
        - config
      parameters:
        - $ref: "#/components/parameters/ListLimit"
      responses:
        "200":
          description: Grouping policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupingPolicyListResponse"
              examples:
                policies:
                  value:
                    items:
                      - id: 1
                        name: Default alert grouping
                        dimension_keys:
                          - alertname
                          - service
                        severity_key: severity
                        source_filter:
                          - prometheus
                        enabled: true
                        created_at: "2026-06-05T04:00:00Z"
                        updated_at: "2026-06-05T04:00:00Z"
        "400":
          description: Grouping policy list parameters are invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid-limit:
                  value:
                    error: "limit must be between 1 and 500"
        "500":
          description: Grouping policy list failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: list grouping policies failed
    post:
      operationId: createGroupingPolicy
      summary: Create a grouping policy
      description: Stores operator-managed alert grouping configuration.
      tags:
        - config
      requestBody:
        description: Grouping policy metadata.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupingPolicyWriteRequest"
            examples:
              default-policy:
                value:
                  name: Default alert grouping
                  dimension_keys:
                    - alertname
                    - service
                  severity_key: severity
                  source_filter:
                    - prometheus
                  enabled: true
      responses:
        "201":
          description: Grouping policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupingPolicy"
              examples:
                created:
                  value:
                    id: 1
                    name: Default alert grouping
                    dimension_keys:
                      - alertname
                      - service
                    severity_key: severity
                    source_filter:
                      - prometheus
                    enabled: true
                    created_at: "2026-06-05T04:00:00Z"
                    updated_at: "2026-06-05T04:00:00Z"
        "400":
          description: Grouping policy request is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid:
                  value:
                    error: "grouping policy: dimension key must not contain whitespace or control characters"
        "409":
          description: Grouping policy conflicts with an existing policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                duplicate:
                  value:
                    error: grouping policy already exists
        "500":
          description: Grouping policy creation failed server-side
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                server-error:
                  value:
                    error: create grouping policy failed
