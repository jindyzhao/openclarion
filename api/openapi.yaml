          type: integer
          format: int64
        assistant_sequence:
          type: integer
        turn_count:
          type: integer
        occurred_at:
          type: string
          format: date-time
      required:
        - event_kind
        - confidence
        - requires_human_review
        - evidence_request_count
        - occurred_at
    DiagnosisRoomNotificationTimelineEntry:
      type: object
      description: Sanitized outbound notification delivery retained from diagnosis-room lifecycle events.
      properties:
        event_kind:
          type: string
        notification_channel_profile_id:
          type: integer
          format: int64
        provider_status:
          type: string
        provider_message_id:
          type: string
        assistant_message_id:
          type: string
        assistant_turn_id:
          type: integer
          format: int64
        assistant_sequence:
          type: integer
        turn_count:
          type: integer
        confidence:
          $ref: "#/components/schemas/ReportConfidence"
        requires_human_review:
          type: boolean
        content_kind:
          type: string
          description: Sanitized proof source for the AI content used to build the outbound notification.
          enum:
            - assistant_message
            - final_conclusion
        content_sha256:
          type: string
          description: SHA-256 digest of the trimmed AI content used to build the outbound notification.
          pattern: "^[a-f0-9]{64}$"
        recommended_action_count:
          type: integer
          minimum: 0
        evidence_request_count:
          type: integer
          minimum: 0
        occurred_at:
          type: string
          format: date-time
      required:
        - event_kind
        - provider_status
        - occurred_at
    DiagnosisNotificationRetryRequest:
      type: object
      description: Request to retry the latest still-failed diagnosis-room notification of a specific lifecycle kind.
      additionalProperties: false
      properties:
        event_kind:
          type: string
          enum:
            - diagnosis_room.assistant_turn_notification_sent
            - diagnosis_room.final_ready_notification_sent
            - diagnosis_room.close_notification_sent
      required:
        - event_kind
    DiagnosisNotificationRetryState:
      type: string
      description: Outcome of a diagnosis-room notification retry request.
      enum:
        - sent
        - already_delivered
    DiagnosisNotificationRetryResponse:
      type: object
      description: Sanitized retry result for one diagnosis-room notification lifecycle event.
      properties:
        retry_state:
          $ref: "#/components/schemas/DiagnosisNotificationRetryState"
        notification:
          $ref: "#/components/schemas/DiagnosisRoomNotificationTimelineEntry"
      required:
        - retry_state
        - notification
    FinalReportSubReportSummary:
      type: object
      description: SubReport summary embedded in the final report content.
      properties:
        title:
          type: string
        severity:
          $ref: "#/components/schemas/ReportSeverity"
        summary:
          type: string
      required:
        - title
        - severity
        - summary
    ReportFinding:
      type: object
      description: Evidence-backed report finding.
      properties:
        label:
          type: string
        detail:
          type: string
        evidence_id:
          type: string
      required:
        - label
        - detail
        - evidence_id
    ReportAction:
      type: object
      description: Operator action recommended by a report.
      properties:
        label:
          type: string
        detail:
          type: string
        priority:
          type: string
          enum:
            - low
            - medium
            - high
      required:
        - label
        - detail
        - priority
    ReportSeverity:
      type: string
      description: Report-facing severity vocabulary.
      examples:
        - warning
      enum:
        - info
        - warning
        - critical
    ReportConfidence:
      type: string
      description: Strength of evidence supporting the report.
      examples:
        - high
      enum:
        - low
        - medium
        - high
    ErrorResponse:
      type: object
      description: Error response payload.
      properties:
        error:
          type: string
          examples:
            - "limit must be between 1 and 500 (got 0)"
      required:
        - error
      examples:
        - error: "limit must be between 1 and 500 (got 0)"
